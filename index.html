<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eurovision 2026 – Draugų Top 10</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07070f; --surface: #0f0f1e; --card: #161628; --border: #252540;
  --gold: #f5c518; --silver: #b8b8cc; --bronze: #cd7f32;
  --purple: #8b5cf6; --pink: #ec4899; --cyan: #22d3ee;
  --text: #f0f0ff; --muted: #6060a0; --danger: #ef4444; --green: #22c55e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 60% 40% at 20% 10%, rgba(139,92,246,0.12) 0%, transparent 60%), radial-gradient(ellipse 50% 35% at 80% 80%, rgba(236,72,153,0.10) 0%, transparent 60%); pointer-events: none; z-index: 0; }
.stars-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.star-dot { position: absolute; border-radius: 50%; background: #fff; animation: twinkle var(--d,3s) ease-in-out infinite alternate; }
@keyframes twinkle { from{opacity:var(--lo,0.1)} to{opacity:var(--hi,0.7)} }

/* LOGIN */
#loginScreen { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; background: var(--bg); }
.login-box { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 48px 40px; width: 100%; max-width: 420px; text-align: center; position: relative; z-index: 1; }
.login-emoji { font-size: 3rem; margin-bottom: 16px; }
.login-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; letter-spacing: 3px; background: linear-gradient(135deg, #fff 0%, var(--gold) 50%, var(--pink) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
.login-sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 32px; letter-spacing: 1px; }
.login-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 1rem; outline: none; transition: border-color 0.2s; margin-bottom: 12px; text-align: center; letter-spacing: 1px; }
.login-input:focus { border-color: var(--purple); }
.login-input::placeholder { color: var(--muted); }
.login-btn { width: 100%; padding: 14px; border-radius: 50px; border: none; background: linear-gradient(135deg, var(--purple), var(--pink)); color: #fff; font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.15s; }
.login-btn:hover { opacity: 0.88; transform: translateY(-1px); }
.login-error { color: var(--danger); font-size: 0.8rem; margin-top: 8px; min-height: 20px; }

/* HEADER */
header { position: relative; z-index: 2; text-align: center; padding: 48px 20px 28px; border-bottom: 1px solid var(--border); }
.logo-row { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 12px; }
.logo-heart { font-size: 1.8rem; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem, 8vw, 5.5rem); letter-spacing: 4px; line-height: 0.9; background: linear-gradient(135deg, #fff 0%, var(--gold) 40%, var(--pink) 80%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.sub { font-size: 0.78rem; letter-spacing: 5px; color: var(--muted); text-transform: uppercase; margin-top: 10px; }
.user-bar { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
.user-chip { background: var(--surface); border: 1px solid var(--purple); border-radius: 20px; padding: 6px 16px; font-size: 0.82rem; color: var(--purple); }
.btn-sm { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--muted); font-family: 'Inter', sans-serif; font-size: 0.75rem; cursor: pointer; transition: all 0.15s; }
.btn-sm:hover { border-color: var(--pink); color: var(--pink); }

/* TABS */
.tabs { position: relative; z-index: 2; display: flex; justify-content: center; gap: 8px; padding: 20px 16px 0; }
.tab { padding: 10px 24px; border-radius: 50px; border: 1px solid var(--border); background: none; color: var(--muted); font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.tab.active { background: linear-gradient(135deg, var(--purple), var(--pink)); border-color: transparent; color: #fff; }

/* APP GRID */
.app { position: relative; z-index: 2; max-width: 1100px; margin: 0 auto; padding: 28px 16px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
@media (max-width: 768px) { .app { grid-template-columns: 1fr; } }
.col-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.col-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 3px; color: var(--muted); }
.count-badge { font-size: 0.72rem; font-weight: 600; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; color: var(--muted); }
.pool-list, .ranking-list { display: flex; flex-direction: column; gap: 6px; }
.ranking-list { min-height: 500px; }
.drop-hint { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 18px; border: 2px dashed var(--border); border-radius: 14px; color: var(--muted); font-size: 0.82rem; letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s; margin-top: 4px; }
.drop-hint.active { border-color: var(--purple); background: rgba(139,92,246,0.06); color: var(--purple); }

/* CARD */
.country-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 11px 13px; display: flex; align-items: center; gap: 10px; cursor: grab; user-select: none; transition: all 0.2s; position: relative; touch-action: none; }
.country-card:hover { border-color: var(--purple); background: rgba(139,92,246,0.08); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(139,92,246,0.15); }
.country-card.dragging { opacity: 0.4; }
.country-card.drag-over { border-color: var(--cyan); background: rgba(34,211,238,0.08); transform: translateY(-2px); }
.rank-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; line-height: 1; width: 28px; text-align: center; flex-shrink: 0; color: var(--muted); }
.rank-1 .rank-num { color: var(--gold); text-shadow: 0 0 12px rgba(245,197,24,0.5); }
.rank-2 .rank-num { color: var(--silver); }
.rank-3 .rank-num { color: var(--bronze); }
.rank-1 { border-color: rgba(245,197,24,0.5); background: rgba(245,197,24,0.05); }
.rank-2 { border-color: rgba(184,184,204,0.35); }
.rank-3 { border-color: rgba(205,127,50,0.4); }
.flag { font-size: 1.7rem; flex-shrink: 0; line-height: 1; width: 34px; text-align: center; }
.info { flex: 1; min-width: 0; }
.country-name { font-weight: 600; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.song { font-size: 0.72rem; color: var(--muted); font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.performer { font-size: 0.68rem; color: var(--cyan); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.card-actions { display: flex; gap: 4px; flex-shrink: 0; }
.btn-icon { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); cursor: pointer; font-size: 0.75rem; padding: 4px 7px; line-height: 1; transition: all 0.15s; }
.btn-icon:hover { border-color: var(--pink); color: var(--pink); }
.btn-icon.add-btn:hover { border-color: var(--purple); color: var(--purple); }
.btn-icon.up-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.btn-icon.down-btn:hover { border-color: var(--gold); color: var(--gold); }
.btn-icon.remove-btn:hover { border-color: var(--danger); color: var(--danger); }
.drag-handle { color: var(--muted); font-size: 0.85rem; cursor: grab; flex-shrink: 0; opacity: 0.5; transition: opacity 0.15s; padding: 0 2px; }
.country-card:hover .drag-handle { opacity: 1; }

/* SAVE BAR */
.save-bar { position: relative; z-index: 2; max-width: 1100px; margin: 0 auto 40px; padding: 0 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.btn { padding: 12px 24px; border-radius: 50px; border: none; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn:hover { transform: translateY(-1px); opacity: 0.9; }
.btn-primary { background: linear-gradient(135deg, var(--purple), var(--pink)); color: #fff; box-shadow: 0 4px 20px rgba(139,92,246,0.3); }
.btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }
.save-status { font-size: 0.8rem; color: var(--muted); }
.save-status.saved { color: var(--green); }

/* LEADERBOARD */
#leaderboardView { position: relative; z-index: 2; max-width: 800px; margin: 0 auto; padding: 28px 16px 80px; display: none; }
.lb-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 3px; color: var(--muted); margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
.lb-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px 24px; margin-bottom: 12px; }
.lb-card.mine { border-color: var(--purple); background: rgba(139,92,246,0.06); }
.lb-user { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.lb-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--purple), var(--pink)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; color: #fff; flex-shrink: 0; }
.lb-name { font-weight: 600; font-size: 0.95rem; }
.lb-date { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
.lb-ranking { display: flex; flex-wrap: wrap; gap: 6px; }
.lb-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 0.73rem; display: flex; align-items: center; gap: 4px; }
.lb-chip.pos1 { border-color: var(--gold); color: var(--gold); }
.lb-chip.pos2 { border-color: var(--silver); color: var(--silver); }
.lb-chip.pos3 { border-color: var(--bronze); color: var(--bronze); }
.lb-empty { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 0.9rem; }
.loading-spin { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.refresh-btn { font-size: 0.75rem; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; }
.refresh-btn:hover { border-color: var(--cyan); color: var(--cyan); }

/* TOAST */
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1a35; border: 1px solid var(--purple); color: var(--text); padding: 11px 24px; border-radius: 50px; font-size: 0.85rem; z-index: 999; transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1); pointer-events: none; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }
::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div class="stars-bg" id="starsBg"></div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="stars-bg" id="starsBg2"></div>
  <div class="login-box">
    <div class="login-emoji">🎤</div>
    <div class="login-title">EUROVISION 2026</div>
    <div class="login-sub">★ Viena · Gegužės 16 ★</div>
    <input class="login-input" id="usernameInput" type="text" placeholder="Įvesk savo vardą..." maxlength="20" autocomplete="off" />
    <button class="login-btn" onclick="login()">Pradėti →</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- MAIN -->
<div id="mainApp" style="display:none">
  <header>
    <div class="logo-row">
      <div class="logo-heart">💜</div>
      <h1>EUROVISION 2026</h1>
      <div class="logo-heart">💙</div>
    </div>
    <div class="sub">★ Viena · Austrija · Gegužės 16 ★</div>
    <div class="user-bar">
      <div class="user-chip">👤 <span id="displayName"></span></div>
      <button class="btn-sm" onclick="logout()">Keisti vardą</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="showTab('my')" id="tabMy">🎯 Mano Top 10</button>
    <button class="tab" onclick="showTab('all')" id="tabAll">👥 Visi Draugai</button>
  </div>

  <!-- MY VIEW -->
  <div id="myView">
    <div class="app">
      <div>
        <div class="col-header">
          <div class="col-title">Visi Finalistai</div>
          <div class="count-badge" id="pool-count">25 šalys</div>
        </div>
        <div class="pool-list" id="pool"></div>
      </div>
      <div>
        <div class="col-header">
          <div class="col-title">Mano Top 10</div>
          <div class="count-badge" id="rank-count">0 / 10</div>
        </div>
        <div class="ranking-list" id="ranking"></div>
        <div class="drop-hint" id="dropHint">⬅ Vilk šalis čia</div>
      </div>
    </div>
    <div class="save-bar">
      <button class="btn btn-primary" onclick="saveRanking()">💾 Išsaugoti</button>
      <button class="btn btn-outline" onclick="resetAll()">↩ Išvalyti</button>
      <span class="save-status" id="saveStatus"></span>
    </div>
  </div>

  <!-- LEADERBOARD -->
  <div id="leaderboardView">
    <div class="lb-title">
      <span>👥 Draugų Prognozės</span>
      <button class="refresh-btn" onclick="loadLeaderboard()">↻ Atnaujinti</button>
    </div>
    <div id="lbContent"><div class="lb-empty"><div class="loading-spin"></div></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://bscwdxkduyefjubqupto.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzY3dkeGtkdXllZmp1YnF1cHRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0MDA2NzksImV4cCI6MjA4Mzk3NjY3OX0.y5JO30tl8ZCxXzek7-yrEFb-Xte9e_Zkmjgi1-F_Cu4';

const COUNTRIES = [
  {id:"DK",flag:"🇩🇰",name:"Danija",song:"Før Vi Går Hjem",performer:"Søren Torpegaard Lund"},
  {id:"DE",flag:"🇩🇪",name:"Vokietija",song:"Fire",performer:"Abor & Tynna"},
  {id:"IL",flag:"🇮🇱",name:"Izraelis",song:"Michelle",performer:"Noam Bettan"},
  {id:"BE",flag:"🇧🇪",name:"Belgija",song:"Dancing on the Ice",performer:"Essyla"},
  {id:"AL",flag:"🇦🇱",name:"Albanija",song:"Nân",performer:"Shkodra Elektronike"},
  {id:"GR",flag:"🇬🇷",name:"Graikija",song:"Ferto",performer:"Klavdia"},
  {id:"UA",flag:"🇺🇦",name:"Ukraina",song:"Choreography",performer:"Ziferblat"},
  {id:"AU",flag:"🇦🇺",name:"Australija",song:"Eclipse",performer:"Delta Goodrem"},
  {id:"RS",flag:"🇷🇸",name:"Serbija",song:"Samo mi se sviđaš",performer:"Megahertz"},
  {id:"MT",flag:"🇲🇹",name:"Malta",song:"Bella",performer:"Miriana Conte"},
  {id:"CZ",flag:"🇨🇿",name:"Čekija",song:"CROSSROADS",performer:"Adonxs"},
  {id:"BG",flag:"🇧🇬",name:"Bulgarija",song:"Bangaranga",performer:"Mvka"},
  {id:"HR",flag:"🇭🇷",name:"Kroatija",song:"Andromeda",performer:"Marko Kutlić"},
  {id:"GB",flag:"🇬🇧",name:"Jungtinė Karalystė",song:"Nothing But Love",performer:"Remember Monday"},
  {id:"FR",flag:"🇫🇷",name:"Prancūzija",song:"Regarde !",performer:"Louane"},
  {id:"MD",flag:"🇲🇩",name:"Moldova",song:"Dansuri și Tradiții",performer:"Banda lui Bobă"},
  {id:"FI",flag:"🇫🇮",name:"Suomija",song:"Liekinheitin",performer:"Linda Lampenius & Pete Parkkonen"},
  {id:"PL",flag:"🇵🇱",name:"Lenkija",song:"Polska Dance",performer:"Justyna Steczkowska"},
  {id:"LT",flag:"🇱🇹",name:"Lietuva",song:"Sólo Quiero Más",performer:"Lion Ceccah"},
  {id:"SE",flag:"🇸🇪",name:"Švedija",song:"Just Go",performer:"KAJ"},
  {id:"CY",flag:"🇨🇾",name:"Kipras",song:"JALLA",performer:"Antigoni"},
  {id:"IT",flag:"🇮🇹",name:"Italija",song:"Per Sempre Sì",performer:"Sal Da Vinci"},
  {id:"NO",flag:"🇳🇴",name:"Norvegija",song:"Neon Lights",performer:"Kyle Alessandro"},
  {id:"RO",flag:"🇷🇴",name:"Rumunija",song:"Dragoste",performer:"Teodora Dună"},
  {id:"AT",flag:"🇦🇹",name:"Austrija",song:"Tanzschein",performer:"Counterpart"},
];

let username = '', ranking = [], dragSrcId = null, dragSrcList = null;

// === SUPABASE ===
async function sbFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation', ...options.headers },
    ...options
  });
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadMyRanking() {
  try {
    const data = await sbFetch(`eurovision_rankings?username=eq.${encodeURIComponent(username)}&select=ranking`);
    if (data && data.length > 0 && data[0].ranking) {
      ranking = data[0].ranking.filter(id => COUNTRIES.find(c => c.id === id));
    }
  } catch(e) {}
}

async function saveRanking() {
  setStatus('Saugojama...');
  try {
    await sbFetch('eurovision_rankings', {
      method: 'POST',
      headers: { 'Prefer': 'resolution=merge-duplicates,return=representation' },
      body: JSON.stringify({ username, ranking, updated_at: new Date().toISOString() })
    });
    setStatus('✅ Išsaugota!', true);
    showToast('💾 Prognozė išsaugota!');
  } catch(e) {
    setStatus('❌ Klaida išsaugant');
    showToast('Nepavyko išsaugoti 😢');
  }
}

async function loadLeaderboard() {
  document.getElementById('lbContent').innerHTML = '<div class="lb-empty"><div class="loading-spin"></div></div>';
  try {
    const data = await sbFetch('eurovision_rankings?select=username,ranking,updated_at&order=updated_at.desc');
    renderLeaderboard(data || []);
  } catch(e) {
    document.getElementById('lbContent').innerHTML = '<div class="lb-empty">Nepavyko užkrauti 😢</div>';
  }
}

// === AUTH ===
function login() {
  const val = document.getElementById('usernameInput').value.trim();
  const err = document.getElementById('loginError');
  if (!val || val.length < 2) { err.textContent = 'Vardas turi būti bent 2 simboliai!'; return; }
  err.textContent = '';
  username = val;
  localStorage.setItem('esc2026_user', username);
  document.getElementById('displayName').textContent = username;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  loadMyRanking().then(() => render());
}

function logout() {
  localStorage.removeItem('esc2026_user');
  username = ''; ranking = [];
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('usernameInput').value = '';
}

document.getElementById('usernameInput').addEventListener('keydown', e => { if(e.key==='Enter') login(); });

// === TABS ===
function showTab(tab) {
  document.getElementById('tabMy').classList.toggle('active', tab==='my');
  document.getElementById('tabAll').classList.toggle('active', tab==='all');
  document.getElementById('myView').style.display = tab==='my' ? 'block' : 'none';
  document.getElementById('leaderboardView').style.display = tab==='all' ? 'block' : 'none';
  if (tab==='all') loadLeaderboard();
}

// === RENDER ===
function getPool() { return COUNTRIES.filter(c => !ranking.includes(c.id)); }
function render() { renderPool(); renderRanking(); updateCounts(); }

function renderPool() {
  const el = document.getElementById('pool');
  el.innerHTML = '';
  getPool().forEach(c => el.appendChild(makeCard(c, 'pool', null)));
}

function renderRanking() {
  const el = document.getElementById('ranking');
  el.innerHTML = '';
  ranking.forEach((id, i) => {
    const c = COUNTRIES.find(x => x.id === id);
    if(c) el.appendChild(makeCard(c, 'ranking', i));
  });
  document.getElementById('dropHint').style.display = ranking.length >= 10 ? 'none' : 'flex';
}

function makeCard(c, listType, rankIdx) {
  const div = document.createElement('div');
  const rClass = rankIdx===0?'rank-1':rankIdx===1?'rank-2':rankIdx===2?'rank-3':'';
  div.className = `country-card ${rClass}`;
  div.dataset.id = c.id; div.dataset.list = listType; div.draggable = true;
  const num = listType==='ranking' ? `<div class="rank-num">${rankIdx+1}</div>` : '';
  const acts = listType==='pool'
    ? `<div class="card-actions"><button class="btn-icon add-btn" onclick="addTo('${c.id}')" ${ranking.length>=10?'disabled style="opacity:0.3"':''}>＋</button></div>`
    : `<div class="card-actions"><button class="btn-icon up-btn" onclick="moveUp('${c.id}')" ${rankIdx===0?'disabled style="opacity:0.3"':''}>↑</button><button class="btn-icon down-btn" onclick="moveDown('${c.id}')" ${rankIdx===ranking.length-1?'disabled style="opacity:0.3"':''}>↓</button><button class="btn-icon remove-btn" onclick="removeFrom('${c.id}')">✕</button></div>`;
  div.innerHTML = `${num}<div class="drag-handle">⠿</div><div class="flag">${c.flag}</div><div class="info"><div class="country-name">${c.name}</div><div class="song">"${c.song}"</div><div class="performer">${c.performer}</div></div>${acts}`;
  div.addEventListener('dragstart', onDragStart);
  div.addEventListener('dragend', onDragEnd);
  div.addEventListener('dragover', onDragOver);
  div.addEventListener('dragleave', onDragLeave);
  div.addEventListener('drop', onDrop);
  return div;
}

function updateCounts() {
  document.getElementById('pool-count').textContent = getPool().length + ' šalys';
  document.getElementById('rank-count').textContent = `${ranking.length} / 10`;
}

// === ACTIONS ===
function addTo(id) { if(ranking.length>=10){showToast('Top 10 pilnas!');return;} if(!ranking.includes(id)){ranking.push(id);} setStatus('');render(); }
function removeFrom(id) { ranking=ranking.filter(x=>x!==id); setStatus('');render(); }
function moveUp(id) { const i=ranking.indexOf(id); if(i>0){[ranking[i-1],ranking[i]]=[ranking[i],ranking[i-1]];setStatus('');render();} }
function moveDown(id) { const i=ranking.indexOf(id); if(i<ranking.length-1){[ranking[i],ranking[i+1]]=[ranking[i+1],ranking[i]];setStatus('');render();} }
function resetAll() { if(ranking.length>0&&!confirm('Išvalyti?'))return; ranking=[];setStatus('');render(); }
function setStatus(msg, ok=false) { const el=document.getElementById('saveStatus'); el.textContent=msg; el.className='save-status'+(ok?' saved':''); }

// === DRAG ===
function onDragStart(e) { dragSrcId=e.currentTarget.dataset.id; dragSrcList=e.currentTarget.dataset.list; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; }
function onDragEnd(e) { e.currentTarget.classList.remove('dragging'); document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over')); document.getElementById('dropHint').classList.remove('active'); }
function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  const tId=e.currentTarget.dataset.id, tList=e.currentTarget.dataset.list;
  if(!dragSrcId||dragSrcId===tId) return;
  if(dragSrcList==='pool'&&tList==='ranking') {
    if(!ranking.includes(dragSrcId)){if(ranking.length>=10){showToast('Top 10 pilnas!');return;} const ti=ranking.indexOf(tId); ranking.splice(ti>=0?ti:ranking.length,0,dragSrcId);}
    else reorder(dragSrcId,tId);
  } else if(dragSrcList==='ranking'&&tList==='ranking') { reorder(dragSrcId,tId); }
  else if(dragSrcList==='ranking'&&tList==='pool') { removeFrom(dragSrcId); return; }
  else if(dragSrcList==='pool'&&tList==='pool') { addTo(dragSrcId); return; }
  setStatus(''); render();
}
function reorder(sId,tId) { const si=ranking.indexOf(sId),ti=ranking.indexOf(tId); if(si<0||ti<0)return; ranking.splice(si,1); ranking.splice(ti,0,sId); }

document.addEventListener('DOMContentLoaded', () => {
  const hint=document.getElementById('dropHint');
  hint.addEventListener('dragover', e=>{e.preventDefault();hint.classList.add('active');});
  hint.addEventListener('dragleave', ()=>hint.classList.remove('active'));
  hint.addEventListener('drop', e=>{
    e.preventDefault(); hint.classList.remove('active');
    if(dragSrcId&&!ranking.includes(dragSrcId)) addTo(dragSrcId);
    else if(dragSrcId){ranking=ranking.filter(x=>x!==dragSrcId);ranking.push(dragSrcId);setStatus('');render();}
  });
});

// === LEADERBOARD ===
function renderLeaderboard(data) {
  const el=document.getElementById('lbContent');
  if(!data.length){el.innerHTML='<div class="lb-empty">Dar niekas nebalsavo 😢<br><br>Būk pirmas!</div>';return;}
  el.innerHTML=data.map(row=>{
    const isMe=row.username===username;
    const init=row.username.substring(0,2).toUpperCase();
    const date=new Date(row.updated_at).toLocaleDateString('lt-LT',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const chips=(row.ranking||[]).map((id,i)=>{
      const c=COUNTRIES.find(x=>x.id===id); if(!c)return '';
      const cls=i===0?'pos1':i===1?'pos2':i===2?'pos3':'';
      return `<div class="lb-chip ${cls}">${i+1}. ${c.flag} ${c.name}</div>`;
    }).join('');
    return `<div class="lb-card ${isMe?'mine':''}">
      <div class="lb-user"><div class="lb-avatar">${init}</div><div><div class="lb-name">${row.username}${isMe?' 👈 tu':''}</div><div class="lb-date">${date}</div></div></div>
      <div class="lb-ranking">${chips||'<span style="color:var(--muted);font-size:0.8rem">Tuščia prognozė</span>'}</div>
    </div>`;
  }).join('');
}

// === TOAST ===
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); }

// === STARS ===
function makeStars(id) {
  const bg=document.getElementById(id); if(!bg)return;
  for(let i=0;i<60;i++){const s=document.createElement('div');s.className='star-dot';const sz=Math.random()*2+0.5;s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--lo:${(Math.random()*0.2+0.05).toFixed(2)};--hi:${(Math.random()*0.5+0.3).toFixed(2)};--d:${(Math.random()*4+2).toFixed(1)}s;animation-delay:${(Math.random()*4).toFixed(1)}s;`;bg.appendChild(s);}
}

// === INIT ===
makeStars('starsBg'); makeStars('starsBg2');
document.getElementById('myView').style.display='block';
document.getElementById('leaderboardView').style.display='none';
const saved=localStorage.getItem('esc2026_user');
if(saved){document.getElementById('usernameInput').value=saved;login();}
