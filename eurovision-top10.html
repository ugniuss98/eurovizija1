<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eurovision 2025 – Mano Top 10 Prognozė</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07070f;
  --surface: #0f0f1e;
  --card: #161628;
  --border: #252540;
  --gold: #f5c518;
  --silver: #b8b8cc;
  --bronze: #cd7f32;
  --purple: #8b5cf6;
  --pink: #ec4899;
  --cyan: #22d3ee;
  --text: #f0f0ff;
  --muted: #6060a0;
  --danger: #ef4444;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated gradient background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(139,92,246,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 35% at 80% 80%, rgba(236,72,153,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 50%, rgba(34,211,238,0.05) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* Stars */
.stars-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.star-dot {
  position: absolute;
  border-radius: 50%;
  background: #fff;
  animation: twinkle var(--d, 3s) ease-in-out infinite alternate;
}
@keyframes twinkle {
  from { opacity: var(--lo, 0.1); }
  to { opacity: var(--hi, 0.7); }
}

/* ====== HEADER ====== */
header {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 60px 20px 40px;
  border-bottom: 1px solid var(--border);
}

.logo-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 16px;
}

.logo-heart {
  font-size: 2rem;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3rem, 10vw, 6.5rem);
  letter-spacing: 4px;
  line-height: 0.9;
  background: linear-gradient(135deg, #fff 0%, var(--gold) 40%, var(--pink) 80%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.sub {
  font-size: 0.8rem;
  letter-spacing: 5px;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 10px;
}

.desc {
  margin-top: 20px;
  font-size: 0.95rem;
  color: var(--silver);
  max-width: 480px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.6;
}

/* ====== LAYOUT ====== */
.app {
  position: relative;
  z-index: 2;
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 16px 80px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  align-items: start;
}

@media (max-width: 768px) {
  .app { grid-template-columns: 1fr; }
}

/* ====== COLUMN HEADERS ====== */
.col-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.col-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 3px;
  color: var(--muted);
}

.count-badge {
  font-size: 0.72rem;
  font-weight: 600;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  color: var(--muted);
  letter-spacing: 1px;
}

/* ====== POOL (all countries) ====== */
.pool-col {}

.pool-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* ====== TOP 10 COLUMN ====== */
.ranking-col {}

.ranking-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-height: 580px;
}

/* Drop zone hint */
.drop-hint {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 18px;
  border: 2px dashed var(--border);
  border-radius: 14px;
  color: var(--muted);
  font-size: 0.82rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: border-color 0.2s, background 0.2s;
  margin-top: 4px;
}
.drop-hint.active {
  border-color: var(--purple);
  background: rgba(139,92,246,0.06);
  color: var(--purple);
}

/* ====== COUNTRY CARD ====== */
.country-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: grab;
  user-select: none;
  transition: border-color 0.2s, background 0.2s, transform 0.15s, box-shadow 0.2s;
  position: relative;
  touch-action: none;
}

.country-card:hover {
  border-color: var(--purple);
  background: rgba(139,92,246,0.08);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(139,92,246,0.15);
}

.country-card.dragging {
  opacity: 0.4;
  transform: scale(0.98);
}

.country-card.drag-over {
  border-color: var(--cyan);
  background: rgba(34,211,238,0.08);
  transform: translateY(-2px);
}

/* Rank number */
.rank-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  line-height: 1;
  width: 32px;
  text-align: center;
  flex-shrink: 0;
  color: var(--muted);
}

.rank-1 .rank-num { color: var(--gold); text-shadow: 0 0 12px rgba(245,197,24,0.5); }
.rank-2 .rank-num { color: var(--silver); }
.rank-3 .rank-num { color: var(--bronze); }

/* Top highlight borders */
.rank-1 { border-color: rgba(245,197,24,0.5); background: rgba(245,197,24,0.05); }
.rank-2 { border-color: rgba(184,184,204,0.35); }
.rank-3 { border-color: rgba(205,127,50,0.4); }

.flag {
  font-size: 1.9rem;
  flex-shrink: 0;
  line-height: 1;
  width: 38px;
  text-align: center;
}

.info {
  flex: 1;
  min-width: 0;
}

.country-name {
  font-weight: 600;
  font-size: 0.9rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.song {
  font-size: 0.73rem;
  color: var(--muted);
  font-style: italic;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 1px;
}

.performer {
  font-size: 0.7rem;
  color: var(--cyan);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 1px;
}

/* Action buttons */
.card-actions {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}

.btn-icon {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  cursor: pointer;
  font-size: 0.8rem;
  padding: 5px 8px;
  line-height: 1;
  transition: all 0.15s;
}
.btn-icon:hover { border-color: var(--pink); color: var(--pink); }
.btn-icon.add-btn:hover { border-color: var(--purple); color: var(--purple); }
.btn-icon.up-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.btn-icon.down-btn:hover { border-color: var(--gold); color: var(--gold); }
.btn-icon.remove-btn:hover { border-color: var(--danger); color: var(--danger); }

/* Drag handle */
.drag-handle {
  color: var(--muted);
  font-size: 0.9rem;
  cursor: grab;
  flex-shrink: 0;
  opacity: 0.5;
  transition: opacity 0.15s;
  padding: 0 2px;
}
.country-card:hover .drag-handle { opacity: 1; }

/* ====== SHARE SECTION ====== */
.share-section {
  position: relative;
  z-index: 2;
  max-width: 1100px;
  margin: 0 auto 60px;
  padding: 0 16px;
}

.share-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 28px 32px;
  display: flex;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
}

.share-preview {
  flex: 1;
  min-width: 240px;
}

.share-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem;
  letter-spacing: 3px;
  color: var(--gold);
  margin-bottom: 10px;
}

.preview-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.preview-chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 0.75rem;
  display: flex;
  align-items: center;
  gap: 5px;
}

.share-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.btn {
  padding: 12px 24px;
  border-radius: 50px;
  border: none;
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.3px;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn:hover { transform: translateY(-1px); opacity: 0.9; }
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: linear-gradient(135deg, var(--purple), var(--pink));
  color: #fff;
  box-shadow: 0 4px 20px rgba(139,92,246,0.3);
}

.btn-outline {
  background: none;
  border: 1px solid var(--border);
  color: var(--text);
}

.btn-outline:hover {
  border-color: var(--cyan);
  color: var(--cyan);
}

/* ====== URL display ====== */
.url-display {
  display: none;
  margin-top: 12px;
  background: var(--surface);
  border: 1px solid var(--purple);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 0.78rem;
  color: var(--cyan);
  word-break: break-all;
  cursor: pointer;
  position: relative;
}

.url-display.visible { display: block; }

.url-copy-hint {
  font-size: 0.65rem;
  color: var(--muted);
  margin-top: 4px;
}

/* ====== TOAST ====== */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1a1a35;
  border: 1px solid var(--purple);
  color: var(--text);
  padding: 11px 24px;
  border-radius: 50px;
  font-size: 0.85rem;
  z-index: 999;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ====== SCROLL BAR ====== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

</style>
</head>
<body>

<div class="stars-bg" id="starsBg"></div>

<header>
  <div class="logo-row">
    <div class="logo-heart">💜</div>
    <h1>EUROVISION 2025</h1>
    <div class="logo-heart">💙</div>
  </div>
  <div class="sub">★ Bazelis · Šveicarija · Gegužės 17 ★</div>
  <p class="desc">Surikiuok savo Top 10 prognozę — vilk korteles arba spausk rodykles. Tada pasidalink nuoroda su draugais!</p>
</header>

<div class="app">
  <!-- LEFT: Pool -->
  <div class="pool-col">
    <div class="col-header">
      <div class="col-title">Visi Finalistai</div>
      <div class="count-badge" id="pool-count">26 šalys</div>
    </div>
    <div class="pool-list" id="pool"></div>
  </div>

  <!-- RIGHT: Top 10 ranking -->
  <div class="ranking-col">
    <div class="col-header">
      <div class="col-title">Mano Top 10</div>
      <div class="count-badge" id="rank-count">0 / 10</div>
    </div>
    <div class="ranking-list" id="ranking"></div>
    <div class="drop-hint" id="dropHint">⬅ Vilk šalis čia</div>
  </div>
</div>

<!-- Share -->
<div class="share-section">
  <div class="share-box">
    <div class="share-preview">
      <div class="share-title">📋 Mano Prognozė</div>
      <div class="preview-list" id="previewList">
        <div style="color:var(--muted);font-size:0.8rem;">Pridėk šalis į Top 10 →</div>
      </div>
      <div class="url-display" id="urlDisplay">
        <span id="urlText"></span>
        <div class="url-copy-hint">Spustelėk, kad nukopijuotum</div>
      </div>
    </div>
    <div class="share-actions">
      <button class="btn btn-primary" onclick="generateShareUrl()">🔗 Gauti nuorodą</button>
      <button class="btn btn-outline" onclick="copyText()">📋 Kopijuoti kaip tekstą</button>
      <button class="btn btn-outline" onclick="resetAll()">↩ Išvalyti viską</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// =====================
// DATA
// =====================
const ALL_COUNTRIES = [
  { id:"AL", flag:"🇦🇱", name:"Albanija",         song:"Zjerm",                       performer:"Shkodra Elektronike" },
  { id:"AM", flag:"🇦🇲", name:"Armėnija",          song:"SURVIVOR",                    performer:"PARG" },
  { id:"AU", flag:"🇦🇺", name:"Australija",        song:"Milkshake Man",               performer:"Go-Jo" },
  { id:"AT", flag:"🇦🇹", name:"Austrija",           song:"Wasted Love",                 performer:"JJ" },
  { id:"BE", flag:"🇧🇪", name:"Belgija",            song:"Strobe Lights",               performer:"Red Sebastian" },
  { id:"DK", flag:"🇩🇰", name:"Danija",             song:"Hallucination",               performer:"Sissal" },
  { id:"EE", flag:"🇪🇪", name:"Estija",             song:"Espresso Macchiato",          performer:"Tommy Cash" },
  { id:"FI", flag:"🇫🇮", name:"Suomija",            song:"ICH KOMME",                   performer:"Erika Vikman" },
  { id:"FR", flag:"🇫🇷", name:"Prancūzija",         song:"maman",                       performer:"Louane" },
  { id:"DE", flag:"🇩🇪", name:"Vokietija",           song:"Baller",                      performer:"Abor & Tynna" },
  { id:"GR", flag:"🇬🇷", name:"Graikija",           song:"Asteromáta",                  performer:"Klavdia" },
  { id:"IS", flag:"🇮🇸", name:"Islandija",          song:"RÓA",                         performer:"Væb" },
  { id:"IE", flag:"🇮🇪", name:"Airija",             song:"Laika Party",                 performer:"Emmy" },
  { id:"IL", flag:"🇮🇱", name:"Izraelis",           song:"New Day Will Rise",           performer:"Yuval Raphael" },
  { id:"IT", flag:"🇮🇹", name:"Italija",            song:"Volevo Essere Un Duro",       performer:"Lucio Corsi" },
  { id:"LV", flag:"🇱🇻", name:"Latvija",            song:"Bur Man Laimi",               performer:"Tautumeitas" },
  { id:"LT", flag:"🇱🇹", name:"Lietuva",            song:"Tavo Akys",                   performer:"Katarsis" },
  { id:"LU", flag:"🇱🇺", name:"Liuksemburgas",      song:"La Poupée Monte Le Son",      performer:"Laura Thorn" },
  { id:"MT", flag:"🇲🇹", name:"Malta",              song:"SERVING",                     performer:"Miriana Conte" },
  { id:"NO", flag:"🇳🇴", name:"Norvegija",          song:"Lighter",                     performer:"Kyle Alessandro" },
  { id:"PL", flag:"🇵🇱", name:"Lenkija",            song:"How I Imagine",               performer:"Justyna Steczkowska" },
  { id:"PT", flag:"🇵🇹", name:"Portugalija",        song:"Nana",                        performer:"NAPA" },
  { id:"SM", flag:"🇸🇲", name:"San Marinas",         song:"Rattlesnake",                 performer:"Gabry Ponte" },
  { id:"ES", flag:"🇪🇸", name:"Ispanija",           song:"Esa Diva",                    performer:"Melody" },
  { id:"SE", flag:"🇸🇪", name:"Švedija",            song:"Bara Bada Bastu",             performer:"KAJ" },
  { id:"CH", flag:"🇨🇭", name:"Šveicarija",         song:"Voyage",                      performer:"Zoë Më" },
  { id:"GB", flag:"🇬🇧", name:"Jungtinė Karalystė", song:"What The Hell Just Happened?",performer:"Remember Monday" },
  { id:"UA", flag:"🇺🇦", name:"Ukraina",            song:"Bird of Pray",                performer:"Ziferblat" },
];

// =====================
// STATE
// =====================
let ranking = []; // up to 10, array of country IDs
let dragSrcId = null;
let dragSrcList = null; // 'pool' or 'ranking'

// Load from URL params
function loadFromUrl() {
  const params = new URLSearchParams(location.search);
  const r = params.get('r');
  if (r) {
    ranking = r.split(',').filter(id => ALL_COUNTRIES.find(c => c.id === id)).slice(0, 10);
  }
}

// =====================
// RENDER
// =====================
function getPool() {
  return ALL_COUNTRIES.filter(c => !ranking.includes(c.id));
}

function render() {
  renderPool();
  renderRanking();
  renderPreview();
  updateCounts();
}

function renderPool() {
  const pool = getPool();
  const el = document.getElementById('pool');
  el.innerHTML = '';
  pool.forEach(c => {
    el.appendChild(makeCard(c, 'pool', null));
  });
}

function renderRanking() {
  const el = document.getElementById('ranking');
  el.innerHTML = '';
  ranking.forEach((id, i) => {
    const c = ALL_COUNTRIES.find(x => x.id === id);
    if (c) el.appendChild(makeCard(c, 'ranking', i));
  });
  const hint = document.getElementById('dropHint');
  hint.style.display = ranking.length >= 10 ? 'none' : 'flex';
}

function makeCard(c, listType, rankIdx) {
  const div = document.createElement('div');
  const rankClass = rankIdx === 0 ? 'rank-1' : rankIdx === 1 ? 'rank-2' : rankIdx === 2 ? 'rank-3' : '';
  div.className = `country-card ${rankClass}`;
  div.dataset.id = c.id;
  div.dataset.list = listType;
  div.draggable = true;

  let leftSide = '';
  if (listType === 'ranking') {
    leftSide = `<div class="rank-num">${rankIdx + 1}</div>`;
  }

  let actions = '';
  if (listType === 'pool') {
    const canAdd = ranking.length < 10;
    actions = `<div class="card-actions">
      <button class="btn-icon add-btn" onclick="addToRanking('${c.id}')" title="Pridėti" ${canAdd ? '' : 'disabled style="opacity:0.3"'}>＋</button>
    </div>`;
  } else {
    actions = `<div class="card-actions">
      <button class="btn-icon up-btn" onclick="moveUp('${c.id}')" title="Aukštyn" ${rankIdx === 0 ? 'disabled style="opacity:0.3"' : ''}>↑</button>
      <button class="btn-icon down-btn" onclick="moveDown('${c.id}')" title="Žemyn" ${rankIdx === ranking.length - 1 ? 'disabled style="opacity:0.3"' : ''}>↓</button>
      <button class="btn-icon remove-btn" onclick="removeFromRanking('${c.id}')" title="Pašalinti">✕</button>
    </div>`;
  }

  div.innerHTML = `
    ${leftSide}
    <div class="drag-handle">⠿</div>
    <div class="flag">${c.flag}</div>
    <div class="info">
      <div class="country-name">${c.name}</div>
      <div class="song">"${c.song}"</div>
      <div class="performer">${c.performer}</div>
    </div>
    ${actions}
  `;

  // Drag events
  div.addEventListener('dragstart', onDragStart);
  div.addEventListener('dragend', onDragEnd);
  div.addEventListener('dragover', onDragOver);
  div.addEventListener('dragleave', onDragLeave);
  div.addEventListener('drop', onDrop);

  return div;
}

function updateCounts() {
  document.getElementById('pool-count').textContent = getPool().length + ' šalys';
  document.getElementById('rank-count').textContent = `${ranking.length} / 10`;
}

function renderPreview() {
  const el = document.getElementById('previewList');
  if (ranking.length === 0) {
    el.innerHTML = '<div style="color:var(--muted);font-size:0.8rem;">Pridėk šalis į Top 10 →</div>';
    return;
  }
  el.innerHTML = ranking.map((id, i) => {
    const c = ALL_COUNTRIES.find(x => x.id === id);
    return `<div class="preview-chip">${i + 1}. ${c.flag} ${c.name}</div>`;
  }).join('');
}

// =====================
// ACTIONS
// =====================
function addToRanking(id) {
  if (ranking.length >= 10) { showToast('Top 10 jau pilnas!'); return; }
  if (!ranking.includes(id)) ranking.push(id);
  render();
}

function removeFromRanking(id) {
  ranking = ranking.filter(x => x !== id);
  render();
}

function moveUp(id) {
  const i = ranking.indexOf(id);
  if (i > 0) { [ranking[i-1], ranking[i]] = [ranking[i], ranking[i-1]]; render(); }
}

function moveDown(id) {
  const i = ranking.indexOf(id);
  if (i < ranking.length - 1) { [ranking[i], ranking[i+1]] = [ranking[i+1], ranking[i]]; render(); }
}

function resetAll() {
  if (ranking.length > 0 && !confirm('Išvalyti viską?')) return;
  ranking = [];
  history.replaceState(null, '', location.pathname);
  document.getElementById('urlDisplay').classList.remove('visible');
  render();
}

// =====================
// DRAG & DROP
// =====================
function onDragStart(e) {
  dragSrcId = e.currentTarget.dataset.id;
  dragSrcList = e.currentTarget.dataset.list;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  document.getElementById('dropHint').classList.remove('active');
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function onDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const targetId = e.currentTarget.dataset.id;
  const targetList = e.currentTarget.dataset.list;

  if (!dragSrcId || dragSrcId === targetId) return;

  if (dragSrcList === 'pool' && targetList === 'ranking') {
    // pool → ranking: swap with target position
    if (!ranking.includes(dragSrcId)) {
      if (ranking.length >= 10) { showToast('Top 10 jau pilnas!'); return; }
      const ti = ranking.indexOf(targetId);
      ranking.splice(ti >= 0 ? ti : ranking.length, 0, dragSrcId);
    } else {
      reorder(dragSrcId, targetId);
    }
  } else if (dragSrcList === 'ranking' && targetList === 'ranking') {
    reorder(dragSrcId, targetId);
  } else if (dragSrcList === 'ranking' && targetList === 'pool') {
    removeFromRanking(dragSrcId);
    return;
  } else if (dragSrcList === 'pool' && targetList === 'pool') {
    // dragging within pool to ranking – add before target? just add
    addToRanking(dragSrcId);
    return;
  }

  render();
}

// Drop on the hint zone
document.addEventListener('DOMContentLoaded', () => {
  const hint = document.getElementById('dropHint');
  hint.addEventListener('dragover', e => { e.preventDefault(); hint.classList.add('active'); });
  hint.addEventListener('dragleave', () => hint.classList.remove('active'));
  hint.addEventListener('drop', e => {
    e.preventDefault();
    hint.classList.remove('active');
    if (dragSrcId && !ranking.includes(dragSrcId)) addToRanking(dragSrcId);
    else if (dragSrcId && dragSrcList === 'ranking') {
      // move to end
      ranking = ranking.filter(x => x !== dragSrcId);
      ranking.push(dragSrcId);
      render();
    }
  });
});

// Also drop on ranking column (empty area)
document.addEventListener('DOMContentLoaded', () => {
  const rankCol = document.getElementById('ranking');
  rankCol.addEventListener('dragover', e => e.preventDefault());
  rankCol.addEventListener('drop', e => {
    // only if dropped on the list itself, not a card
    if (e.target === rankCol && dragSrcId && !ranking.includes(dragSrcId)) addToRanking(dragSrcId);
  });
});

function reorder(srcId, tgtId) {
  const si = ranking.indexOf(srcId);
  const ti = ranking.indexOf(tgtId);
  if (si < 0 || ti < 0) return;
  ranking.splice(si, 1);
  ranking.splice(ti, 0, srcId);
}

// =====================
// SHARE
// =====================
function generateShareUrl() {
  if (ranking.length === 0) { showToast('Pirma pridėk šalių į Top 10!'); return; }
  const params = new URLSearchParams();
  params.set('r', ranking.join(','));
  const url = location.origin + location.pathname + '?' + params.toString();
  history.replaceState(null, '', '?' + params.toString());
  const el = document.getElementById('urlDisplay');
  document.getElementById('urlText').textContent = url;
  el.classList.add('visible');
  el.onclick = () => { navigator.clipboard.writeText(url); showToast('✅ Nuoroda nukopijuota!'); };
  navigator.clipboard.writeText(url).then(() => showToast('🔗 Nuoroda nukopijuota! Siųsk draugams!')).catch(() => showToast('🔗 Nuoroda sugeneruota!'));
}

function copyText() {
  if (ranking.length === 0) { showToast('Pirma sudėk Top 10!'); return; }
  const lines = ranking.map((id, i) => {
    const c = ALL_COUNTRIES.find(x => x.id === id);
    return `${i+1}. ${c.flag} ${c.name} – "${c.song}"`;
  });
  const text = `🎤 Mano Eurovision 2025 Top 10 Prognozė:\n\n` + lines.join('\n');
  navigator.clipboard.writeText(text);
  showToast('📋 Nukopijuota!');
}

// =====================
// TOAST
// =====================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// =====================
// STARS BG
// =====================
function makeStars() {
  const bg = document.getElementById('starsBg');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star-dot';
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%; top:${Math.random()*100}%;
      --lo:${(Math.random()*0.2+0.05).toFixed(2)};
      --hi:${(Math.random()*0.5+0.3).toFixed(2)};
      --d:${(Math.random()*4+2).toFixed(1)}s;
      animation-delay:${(Math.random()*4).toFixed(1)}s;
    `;
    bg.appendChild(s);
  }
}

// =====================
// INIT
// =====================
loadFromUrl();
render();
makeStars();
</script>
